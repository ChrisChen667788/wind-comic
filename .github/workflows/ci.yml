name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          # CI runs unit + integration tests with mocked providers — no real keys needed.
          NODE_ENV: test

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so Next.js build doesn't fail on missing env at module load.
          # No real outbound calls are made during build.
          OPENAI_API_KEY: dummy
          JWT_SECRET: dummy_for_build_only_change_in_production
